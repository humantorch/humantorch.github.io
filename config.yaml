baseURL: 'https://scottkosman.com/'
languageCode: en-us
title: scott kosman
theme: PaperMod

markup:
  goldmark:
    renderer:
      unsafe: true


params:
  hideHomePosts: true
  ShowPostNavLinks: false
  disableSpecial1stPost: true
  homeInfoParams:
    Title: ""
    Content: ""
  defaultTheme: light
  disableThemeToggle: false
  # Simple Analytics configuration
  simpleAnalytics:
    enabled: true
  profileMode:
    enabled: false
    title: "scott kosman" # optional default will be site title
    subtitle: "Engineering leader building and scaling multi-team platform organizations.<br><br>I lead MSP and Distribution engineering at <a href=\"https://1password.com\">1Password</a>, delivering $1.4M+ in net-new ARR in the first year while growing the org from a single team into a multi-team domain.<br><br>I focus on turning ambiguous strategy into execution, aligning Product, GTM, and Engineering around outcomes, and building systems that let teams operate effectively at scale.<br><br><b>What I do:</b><br>• Build and scale multi-team engineering organizations<br>• Turn strategy into clear, executable plans<br>• Align Product, GTM, and Engineering around outcomes<br>• Develop leaders and scalable systems<br>• Bring clarity to ambiguous environments<br><br><b>Selected impact:</b><br>• Scaled org from 2 to 12+ engineers with EM and Staff layers<br>• Delivered Pax8 integration 2 months early enabling ~$237K ARR<br>• Led domain generating $1.4M+ net-new ARR<br>• Maintained 0% attrition through growth and restructuring<br>• Built execution systems enabling predictable multi-team delivery<br><br><code><b>$ npx scottkosman</b></code>"
    imageUrl: "scott-2.jpg" # optional
    # imageTitle: "<title of image as alt>" # optional
    imageWidth: 250 # custom size
    imageHeight: 250 # custom size
  socialIcons: # optional
    - name: "instagram"
      url: "https://instagram.com/humantorch"
      align: center
    - name: "linkedin"
      url: "https://www.linkedin.com/in/scottkosman/"
      align: center
    - name: "github"
      url: "https://github.com/humantorch/"
      align: center
    - name: "CV"
      url: "https://docs.google.com/document/d/1gcEzsNHWAllGH9mt6bfjie900B-rQNiatwdHiRj_Yog/edit?usp=sharing"
      align: center
    - name: "Email"
      url: "mailto:kosman.scott@gmail.com"
      align: center
  assets:
    favicon: "/favicon.ico"
    customCSS:
    - css/extended/mine.css

